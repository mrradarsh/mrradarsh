<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="0.5" stop-color="#0D0D18"/>
      <stop offset="1" stop-color="#0A0A14"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00C2FF">
        <animate attributeName="stop-color" values="#00C2FF;#8A2BE2;#00C2FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#8A2BE2">
        <animate attributeName="stop-color" values="#8A2BE2;#00C2FF;#8A2BE2" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00C2FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00C2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8A2BE2" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="280" rx="16" fill="url(#bgGrad)"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.03">
    <path d="M0 70H900"/><path d="M0 140H900"/><path d="M0 210H900"/>
    <path d="M150 0V280"/><path d="M300 0V280"/><path d="M450 0V280"/><path d="M600 0V280"/><path d="M750 0V280"/>
  </g>

  <!-- ambient glows -->
  <circle cx="780" cy="60" r="160" fill="url(#glowPurple)">
    <animate attributeName="cy" values="60;90;60" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="230" r="150" fill="url(#glowCyan)">
    <animate attributeName="cy" values="230;200;230" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- neural network motif (right side) -->
  <g transform="translate(640,52)">
    <!-- connections -->
    <g stroke="#5D3FD3" stroke-opacity="0.45" stroke-width="1.2">
      <line x1="20" y1="30" x2="100" y2="10"/>
      <line x1="20" y1="30" x2="100" y2="60"/>
      <line x1="20" y1="90" x2="100" y2="60"/>
      <line x1="20" y1="90" x2="100" y2="110"/>
      <line x1="20" y1="150" x2="100" y2="110"/>
      <line x1="20" y1="150" x2="100" y2="160"/>
      <line x1="100" y1="10" x2="180" y2="55"/>
      <line x1="100" y1="60" x2="180" y2="55"/>
      <line x1="100" y1="110" x2="180" y2="55"/>
      <line x1="100" y1="160" x2="180" y2="115"/>
      <line x1="100" y1="110" x2="180" y2="115"/>
      <line x1="100" y1="60" x2="180" y2="115"/>
      <line x1="180" y1="55" x2="245" y2="85"/>
      <line x1="180" y1="115" x2="245" y2="85"/>
    </g>
    <!-- pulse travelling dots -->
    <circle r="2.5" fill="#00C2FF">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M20 30 L100 60 L180 55 L245 85"/>
    </circle>
    <circle r="2.5" fill="#8A2BE2">
      <animateMotion dur="3.1s" repeatCount="indefinite" path="M20 150 L100 110 L180 115 L245 85"/>
    </circle>
    <circle r="2" fill="#00C2FF">
      <animateMotion dur="2.8s" repeatCount="indefinite" begin="0.9s" path="M20 90 L100 60 L180 115 L245 85"/>
    </circle>
    <!-- nodes -->
    <g>
      <circle cx="20" cy="30" r="5" fill="#0D0D18" stroke="#00C2FF" stroke-width="1.5">
        <animate attributeName="r" values="5;6.5;5" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="90" r="5" fill="#0D0D18" stroke="#00C2FF" stroke-width="1.5">
        <animate attributeName="r" values="5;6.5;5" dur="3.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="150" r="5" fill="#0D0D18" stroke="#00C2FF" stroke-width="1.5">
        <animate attributeName="r" values="5;6.5;5" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="10" r="5" fill="#0D0D18" stroke="#5D3FD3" stroke-width="1.5"/>
      <circle cx="100" cy="60" r="5" fill="#0D0D18" stroke="#5D3FD3" stroke-width="1.5">
        <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="110" r="5" fill="#0D0D18" stroke="#5D3FD3" stroke-width="1.5"/>
      <circle cx="100" cy="160" r="5" fill="#0D0D18" stroke="#5D3FD3" stroke-width="1.5">
        <animate attributeName="r" values="5;7;5" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="55" r="5" fill="#0D0D18" stroke="#8A2BE2" stroke-width="1.5">
        <animate attributeName="r" values="5;7;5" dur="2.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="115" r="5" fill="#0D0D18" stroke="#8A2BE2" stroke-width="1.5"/>
      <circle cx="245" cy="85" r="7" fill="#8A2BE2" fill-opacity="0.9">
        <animate attributeName="fill-opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- terminal-style intro -->
  <g font-family="'Cascadia Code','Fira Code',Consolas,monospace">
    <text x="64" y="78" font-size="15" fill="#9C9CA8">
      <tspan fill="#00C2FF">~$</tspan> whoami
      <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
    </text>

    <!-- name -->
    <text x="62" y="138" font-size="52" font-weight="700" fill="url(#nameGrad)" letter-spacing="1">ADARSH DUBEY</text>

    <!-- role line -->
    <text x="64" y="178" font-size="19" fill="#F5F5F0" letter-spacing="0.5">
      <tspan fill="#8A2BE2">⟨</tspan> AI Developer <tspan fill="#5D3FD3">·</tspan> Full-Stack Engineer <tspan fill="#8A2BE2">⟩</tspan>
    </text>

    <!-- tagline -->
    <text x="64" y="212" font-size="14" fill="#9C9CA8">Building intelligent products where AI meets premium design — Mumbai, India</text>

    <!-- blinking cursor -->
    <rect x="64" y="228" width="10" height="18" fill="#00C2FF">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="82" y="242" font-size="13" fill="#5A5A66">// always shipping</text>
  </g>

  <!-- accent corner ticks -->
  <g stroke="#00C2FF" stroke-width="2" stroke-opacity="0.7">
    <path d="M24 24 H44 M24 24 V44"/>
    <path d="M876 256 H856 M876 256 V236"/>
  </g>
</svg>
