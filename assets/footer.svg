<svg width="900" height="230" viewBox="0 0 900 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="900" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="0.55" stop-color="#0D0D1A"/>
      <stop offset="1" stop-color="#0A0A14"/>
    </linearGradient>
    <linearGradient id="skyGlow" x1="450" y1="230" x2="450" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A2BE2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cityGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16142A"/>
      <stop offset="0.5" stop-color="#1C1838"/>
      <stop offset="1" stop-color="#141226"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00C2FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00C2FF"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameG" x1="330" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00C2FF">
        <animate attributeName="stop-color" values="#00C2FF;#8A2BE2;#00C2FF" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#8A2BE2">
        <animate attributeName="stop-color" values="#8A2BE2;#00C2FF;#8A2BE2" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- night sky -->
  <rect width="900" height="230" rx="16" fill="url(#fbg)"/>
  <rect width="900" height="230" rx="16" fill="url(#skyGlow)"/>

  <!-- twinkling stars -->
  <g fill="#F5F5F0">
    <circle cx="90" cy="38" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="64" r="1.1"><animate attributeName="opacity" values="1;0.15;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="30" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="545" cy="26" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="52" r="1.4"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="775" cy="30" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="845" cy="70" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="48" r="1"><animate attributeName="opacity" values="0.5;1;0.2;0.5" dur="4.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== MUMBAI SKYLINE (left + right clusters) ===== -->
  <g fill="url(#cityGrad)">
    <!-- left cluster -->
    <rect x="30"  y="158" width="26" height="72"/>
    <rect x="62"  y="138" width="34" height="92"/>
    <rect x="102" y="170" width="22" height="60"/>
    <rect x="130" y="148" width="30" height="82"/>
    <rect x="166" y="176" width="20" height="54"/>
    <!-- right cluster -->
    <rect x="710" y="162" width="24" height="68"/>
    <rect x="740" y="142" width="32" height="88"/>
    <rect x="778" y="168" width="22" height="62"/>
    <rect x="806" y="150" width="28" height="80"/>
    <rect x="840" y="172" width="22" height="58"/>
  </g>
  <!-- antenna on tallest towers -->
  <g stroke="#2A2450" stroke-width="2">
    <line x1="79" y1="138" x2="79" y2="122"/>
    <line x1="756" y1="142" x2="756" y2="126"/>
  </g>
  <circle cx="79" cy="120" r="2" fill="#FF4D6D"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="756" cy="124" r="2" fill="#FF4D6D"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>

  <!-- lit windows flickering -->
  <g fill="#F7C948" opacity="0.85">
    <rect x="68"  y="150" width="4" height="5"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="4.1s" repeatCount="indefinite"/></rect>
    <rect x="82"  y="164" width="4" height="5"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.3s" repeatCount="indefinite"/></rect>
    <rect x="138" y="158" width="4" height="5"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="5s" repeatCount="indefinite"/></rect>
    <rect x="148" y="176" width="4" height="5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.7s" repeatCount="indefinite"/></rect>
    <rect x="40"  y="170" width="4" height="5"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.6s" repeatCount="indefinite"/></rect>
    <rect x="748" y="154" width="4" height="5"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite"/></rect>
    <rect x="762" y="170" width="4" height="5"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.1s" repeatCount="indefinite"/></rect>
    <rect x="814" y="162" width="4" height="5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.8s" repeatCount="indefinite"/></rect>
    <rect x="718" y="172" width="4" height="5"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.9s" repeatCount="indefinite"/></rect>
    <rect x="846" y="180" width="4" height="5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.4s" repeatCount="indefinite"/></rect>
  </g>

  <!-- ===== BANDRA-WORLI SEA LINK (center-bottom) ===== -->
  <g stroke="#3A2F6B" stroke-width="2" fill="none">
    <!-- deck -->
    <path d="M210 206 H690"/>
    <!-- pylons -->
    <path d="M340 206 L350 126 L360 206" stroke-width="3"/>
    <path d="M540 206 L550 126 L560 206" stroke-width="3"/>
    <!-- cable fans -->
    <g stroke-width="1" stroke-opacity="0.8">
      <line x1="350" y1="130" x2="240" y2="206"/><line x1="350" y1="134" x2="270" y2="206"/>
      <line x1="350" y1="138" x2="300" y2="206"/><line x1="350" y1="142" x2="325" y2="206"/>
      <line x1="350" y1="130" x2="460" y2="206"/><line x1="350" y1="134" x2="430" y2="206"/>
      <line x1="350" y1="138" x2="400" y2="206"/><line x1="350" y1="142" x2="375" y2="206"/>
      <line x1="550" y1="130" x2="440" y2="206"/><line x1="550" y1="134" x2="470" y2="206"/>
      <line x1="550" y1="138" x2="500" y2="206"/><line x1="550" y1="142" x2="525" y2="206"/>
      <line x1="550" y1="130" x2="660" y2="206"/><line x1="550" y1="134" x2="630" y2="206"/>
      <line x1="550" y1="138" x2="600" y2="206"/><line x1="550" y1="142" x2="575" y2="206"/>
    </g>
  </g>
  <!-- pylon beacon lights -->
  <circle cx="350" cy="124" r="2.2" fill="#00C2FF"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="124" r="2.2" fill="#00C2FF"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
  <!-- car lights crossing the bridge -->
  <circle r="2" fill="#F7C948"><animateMotion dur="5.5s" repeatCount="indefinite" path="M210 203 H690"/></circle>
  <circle r="2" fill="#FF4D6D"><animateMotion dur="6.5s" repeatCount="indefinite" begin="2s" path="M690 203 H210"/></circle>

  <!-- sea shimmer under bridge -->
  <g stroke="#00C2FF" stroke-opacity="0.25">
    <path d="M220 216 H320"><animate attributeName="stroke-opacity" values="0.25;0.05;0.25" dur="3.4s" repeatCount="indefinite"/></path>
    <path d="M400 222 H520"><animate attributeName="stroke-opacity" values="0.08;0.3;0.08" dur="4.2s" repeatCount="indefinite"/></path>
    <path d="M580 216 H680"><animate attributeName="stroke-opacity" values="0.25;0.06;0.25" dur="3.8s" repeatCount="indefinite"/></path>
  </g>

  <!-- ===== heartbeat pulse line (always shipping) ===== -->
  <g>
    <path d="M0 96 H330 L345 96 L355 78 L368 112 L380 96 H900" stroke="url(#pulseGrad)" stroke-width="1.6" fill="none" stroke-opacity="0.55"/>
    <circle r="3" fill="#00C2FF">
      <animateMotion dur="4s" repeatCount="indefinite" path="M0 96 H330 L345 96 L355 78 L368 112 L380 96 H900"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== sign-off text ===== -->
  <g font-family="'Segoe UI',system-ui,sans-serif" text-anchor="middle">
    <text x="450" y="52" font-size="13" fill="#9C9CA8" letter-spacing="3">FROM THE CITY THAT NEVER SLEEPS</text>
    <text x="450" y="86" font-size="26" font-weight="700" fill="url(#nameG)" letter-spacing="1">Crafted with code &amp; chai ☕</text>
    <text x="450" y="112" font-size="14" fill="#F5F5F0" letter-spacing="0.5">Adarsh Dubey · Mumbai 🇮🇳 · turning ideas into experiences since 2023</text>
  </g>
</svg>
